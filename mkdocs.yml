site_name: AgentHarness
site_description: AgentHarness is a Python agent harness built around deterministic state machines, inspectable event streams, and offline replay.
site_url: https://aafre.github.io/agentharness/
repo_url: https://github.com/aafre/agentharness
repo_name: aafre/agentharness
docs_dir: docs
site_dir: site
exclude_docs: |
  superpowers/**
  codex-task-*.md

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.instant
    - content.code.copy
    - content.code.annotate
    - search.suggest
  palette:
    - scheme: default
      primary: black
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: black
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

markdown_extensions:
  - admonition
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets:
      base_path: .
      check_paths: true
  - pymdownx.highlight
  - toc:
      permalink: true

plugins:
  - search
  - markdown-exec
  - mkdocstrings:
      handlers:
        python:
          paths:
            - packages/agentharness-core/src
            - packages/agentharness-sdk/src
            - packages/agentharness-contrib/src
          options:
            show_source: true
            show_signature: true
            show_signature_annotations: true
  - llmstxt:
      full_output: llms-full.txt
      sections:
        Home:
          - index.md: pitch, 30-second why, and a FakeModel quickstart.
        Getting started:
          - getting-started/install.md: install targets, source workflow, and optional provider extras.
          - getting-started/first-run.md: FakeModel, State.start, run, event iteration, and result inspection.
          - getting-started/record-replay.md: save a trace, replay offline, and understand DivergenceError.
        Core concepts:
          - concepts/thesis.md: decide, perform, reduce, and why purity buys production properties.
          - concepts/state-and-events.md: immutable data algebra and JSON round-trips.
          - concepts/effects-and-runner.md: where impure work happens and what gets recorded.
          - concepts/determinism-kit.md: seeds, scripted choices, pure reducers, and trace replay.
        Cookbook:
          - cookbook/index.md: recipes for common agent workflow tasks.
          - cookbook/unit-test-agent.md: deterministic tests with FakeModel and trace assertions.
          - cookbook/record-replay-offline.md: capture and replay a trace with no provider calls.
          - cookbook/catch-regression.md: compare traces and find behavior drift.
          - cookbook/define-tool.md: expose typed Python callables as agent tools.
          - cookbook/multi-step-tool-use.md: run chained tool calls through the core loop.
          - cookbook/inspect-event-log.md: inspect model, tool, and state events.
          - cookbook/swap-providers.md: switch between FakeModel, Anthropic, and OpenAI-compatible models.
          - cookbook/run-async.md: run async tools and async agents.
          - cookbook/persist-diff-traces.md: persist JSONL traces and diff them.
          - cookbook/bring-your-own-model.md: implement the Model protocol for another provider.
        Providers:
          - providers/anthropic.md: Anthropic model adapter and optional dependency setup.
        Guides:
          - guides/testing-agents.md: testing patterns for reducers, traces, tools, and providers.
          - guides/tools.md: "@tool decorator, schemas, and execution behavior."
        Reference:
          - reference/core.md: mkdocstrings reference for agentharness_core.
          - reference/agentharness.md: mkdocstrings reference for agentharness.
          - reference/contrib.md: mkdocstrings reference for agentharness_contrib.

nav:
  - Home: index.md
  - Getting started:
      - Install: getting-started/install.md
      - Your first run: getting-started/first-run.md
      - Record & replay: getting-started/record-replay.md
  - Core concepts:
      - The thesis: concepts/thesis.md
      - State & events: concepts/state-and-events.md
      - Effects & the runner: concepts/effects-and-runner.md
      - Determinism kit: concepts/determinism-kit.md
  - Cookbook:
      - Cookbook: cookbook/index.md
      - Unit-test an agent: cookbook/unit-test-agent.md
      - Record and replay offline: cookbook/record-replay-offline.md
      - Catch a regression: cookbook/catch-regression.md
      - Define a tool with @tool: cookbook/define-tool.md
      - Multi-step tool use: cookbook/multi-step-tool-use.md
      - Inspect the event log: cookbook/inspect-event-log.md
      - Swap providers: cookbook/swap-providers.md
      - Run async: cookbook/run-async.md
      - Persist and diff traces: cookbook/persist-diff-traces.md
      - Bring your own model: cookbook/bring-your-own-model.md
  - Providers:
      - Anthropic: providers/anthropic.md
  - Guides:
      - Testing agents: guides/testing-agents.md
      - Tools with @tool: guides/tools.md
  - Reference:
      - Core: reference/core.md
      - AgentHarness: reference/agentharness.md
      - Contrib: reference/contrib.md
