[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agentharness-contrib"
version = "0.0.1"
description = "Provider implementations and common tools for AgentHarness (Anthropic, OpenAI, Ollama) behind optional extras."
readme = "README.md"
requires-python = ">=3.12"
license = "Apache-2.0"
authors = [{ name = "AgentHarness contributors" }]
keywords = ["agent", "llm", "anthropic", "openai", "ollama", "provider"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3.12",
    "Typing :: Typed",
]
dependencies = ["agentharness-core"]

[project.optional-dependencies]
anthropic = ["anthropic>=0.40"]
openai = ["openai>=1.40"]

[project.urls]
Homepage = "https://github.com/agentharness/agentharness"
Source = "https://github.com/agentharness/agentharness"

[tool.hatch.build.targets.wheel]
packages = ["src/agentharness_contrib"]
