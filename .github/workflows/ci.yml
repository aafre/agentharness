name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: lint + type (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Sync
        run: uv sync --python ${{ matrix.python-version }}
      - name: Ruff (lint)
        run: uv run ruff check
      - name: Ruff (format check)
        run: uv run ruff format --check
      - name: Mypy (strict)
        run: uv run mypy

  test:
    name: test (py${{ matrix.python-version }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Sync
        run: uv sync --python ${{ matrix.python-version }}
      - name: Run tests
        # -p no:randomly keeps property-test seeds reproducible across the matrix.
        run: uv run pytest -q
      - name: Run the quickstart example (smoke)
        run: uv run python examples/quickstart.py

  build:
    name: build distributions
    runs-on: ubuntu-latest
    needs: [quality, test]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Build agentharness-core
        # In a uv workspace, `uv build <path>` defaults to the workspace-root dist/.
        # Pin the output dir so the check/upload steps below find the artifacts.
        run: uv build packages/agentharness-core -o packages/agentharness-core/dist
      - name: Check wheel metadata
        run: |
          uv run --with twine python -m twine check packages/agentharness-core/dist/*
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-agentharness-core
          path: packages/agentharness-core/dist/*
